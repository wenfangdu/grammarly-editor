<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MGE (Minimal Grammarly Editor)</title>
    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="ress.css" />
    <style>
      html {
        height: 100%;
      }
      body {
        background: #000;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      * {
        color: #eee;
      }
      textarea {
        flex: 1;
        width: 50%;
        border: 1px solid #555;
        border-radius: 6px;
        outline: none;
        margin-top: 20px;
        padding: 15px 20px;
        line-height: 1.5;
        resize: none;
      }
      textarea::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      textarea::-webkit-scrollbar-thumb {
        background: #fff8;
        border-radius: 2px;
      }
      textarea::-webkit-scrollbar-corner {
        background: transparent;
      }
    </style>

    <script src="main.js" defer></script>
  </head>
  <body>
    <h1>Grammarly Editor</h1>
    <textarea placeholder="Please type in..."></textarea>
  </body>
</html>
